<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KGP | Podwika</title>

  <link rel="stylesheet" href="css/style.css">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body>
  <header data-include="components/header.html"></header>

  <section class="hobby">
    <h2>Korona Gór Polski</h2>

    <div class="progress-container">
      <div id="progress-text"></div>
      <div class="progress-bar">
        <div id="progress-fill"></div>
      </div>
    </div>

    <div class="kgp-container">
      <div id="map"></div>
      <div class="kgp-list">
        <ul id="peak-list"></ul>
      </div>
    </div>
  </section>

  <div data-include="components/footer.html"></div>
  <script src="js/include.js"></script>


  <!-- Skrypt do mapy -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const map = L.map('map').setView([52.0, 19.0], 6);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
      }).addTo(map);

      const greenIcon = L.icon({
        iconUrl: 'https://maps.google.com/mapfiles/ms/icons/green-dot.png',
        iconSize: [32, 32],
        iconAnchor: [16, 32]
      });

      const redIcon = L.icon({
        iconUrl: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png',
        iconSize: [32, 32],
        iconAnchor: [16, 32]
      });

    // LISTA - odczytanie danych z kgp.json
    fetch('js/kgp.json')
      .then(res => res.json())
      .then(peaks => {

        const peakList = document.getElementById("peak-list");
        let doneCount = 0;

        peaks.forEach(peak => {

          if (peak.done) doneCount++;

          const marker = L.marker(peak.coords, {
            icon: peak.done ? greenIcon : redIcon
          }).addTo(map);

          let popupContent = `<h3>${peak.name}</h3>
            <p>Pasmo: ${peak.pasmo}</p>
            <p>Wysokość: ${peak.height}</p>`;

          if (peak.done) {
            popupContent += `
              <p>Data zdobycia: ${peak.date}</p>
              <img src="${peak.image}" style="width:100%; border-radius:8px;">
              <p><a href="${peak.route}" target="_blank">Zobacz trasę</a></p>
            `;
          } else {
            popupContent += `
              <p><i>Jeszcze nie zdobyty</i></p>
              <p><a href="${peak.route}" target="_blank">Zobacz trasę</a></p>
            `;
          }

          marker.bindPopup(popupContent, {
            minWidth: 250,
          });

          // lista
          const li = document.createElement("li");
          li.innerHTML = `
            <strong>${peak.name}</strong><br>
            <span style="font-size: 0.9em; color: gray;">
            ${peak.height}
            </span>
          `;
          li.className = peak.done ? "done" : "not-done";

          li.addEventListener("click", () => {
            map.setView(peak.coords, 10);
            marker.openPopup();
          });
          peakList.appendChild(li);
        });

        // progress bar
        const progress = (doneCount / peaks.length) * 100;

        document.getElementById("progress-fill").style.width = progress + "%";
        document.getElementById("progress-text").textContent =
          `Zdobyte: ${doneCount} / ${peaks.length}`;

      });
    });
  </script>

</body>

</html>
