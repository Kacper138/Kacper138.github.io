<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="img/favicon.ico">
  <title>Podwika | Strona</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header data-include="components/header.html"></header>

  <section class="system">
  <img src="img/profilowe.jpeg" alt="Profil" class="profile-pic">

  <div class="circuit">
    <!-- SVG linie -->
    <svg class="lines" viewBox="0 0 1000 500">
      <line x1="500" y1="100" x2="400" y2="1" />
      <line x1="400" y1="1" x2="300" y2="1" />
      <line x1="300" y1="1" x2="250" y2="50" />
      <line x1="250" y1="50" x2="50" y2="50" />

      <line x1="500" y1="100" x2="600" y2="1" />
      <line x1="600" y1="1" x2="700" y2="1" />
      <line x1="700" y1="1" x2="750" y2="50" />
      <line x1="750" y1="50" x2="950" y2="50" />

      <line x1="500" y1="100" x2="350" y2="100" />
      <line x1="350" y1="100" x2="300" y2="150" />
      <line x1="300" y1="150" x2="300" y2="200" />
      <line x1="300" y1="200" x2="250" y2="250" />
      <line x1="250" y1="250" x2="0" y2="250" />

      <line x1="500" y1="100" x2="650" y2="100" />
      <line x1="650" y1="100" x2="700" y2="150" />
      <line x1="700" y1="150" x2="700" y2="200" />
      <line x1="700" y1="200" x2="750" y2="250" />
      <line x1="750" y1="250" x2="1000" y2="250" />
      
      <line x1="500" y1="100" x2="400" y2="200" />
      <line x1="400" y1="200" x2="400" y2="400" />
      <line x1="400" y1="400" x2="350" y2="450" />
      <line x1="350" y1="450" x2="150" y2="450" />

      <line x1="500" y1="100" x2="600" y2="200" />
      <line x1="600" y1="200" x2="600" y2="400" />
      <line x1="600" y1="400" x2="650" y2="450" />
      <line x1="650" y1="450" x2="850" y2="450" />

    </svg>

    <!-- Punkty -->
    <div class="node" style="top: 20%; left: 50%;" data-link="index.html">
      <img src="icons/user.svg" alt="user">
      <span></span>
    </div>
    <div class="node" style="top: 10%; left: 15%;" data-link="index.html">
      <img src="icons/circle.svg" alt="cos">
      <span></span>
    </div>
    <div class="node" style="top: 10%; left: 85%;" data-link="index.html">
      <img src="icons/circle.svg" alt="cos">
      <span></span>
    </div>
    <div class="node" style="top: 50%; left: 10%;" data-link="projekty.html">
      <img src="icons/shield.svg" alt="shield">
      <span>Projekty</span>
    </div>
    <div class="node" style="top: 50%; left: 90%;" data-link="hobby.html">
      <img src="icons/ball.svg" alt="ball">
      <span>Hobby</span>
    </div>
    <div class="node" style="top: 90%; left: 25%;" data-link="kgp.html">
      <img src="icons/mountain.svg" alt="mountain">
      <span>KGP</span>
    </div>
    <div class="node" style="top: 90%; left: 75%;" data-link="camino.html">
      <img src="icons/run.svg" alt="run">
      <span>Camino</span>
    </div>
  </div>
</section>

  <div data-include="components/footer.html"></div>

  <script src="js/include.js"></script>
</body>
</html>
